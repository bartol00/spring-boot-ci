name: Release

on:
  workflow_call:
    inputs:
      java-version:
        required: false
        type: string
        default: "17"
      bump-type:
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ inputs.java-version }}

      - name: Get latest tag
        id: tag
        run: |
          git fetch --tags
          TAG=$(git describe --tags --abbrev=0 || echo "v0.0.0")
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Calculate version
        id: version
        run: |
          VERSION=${{ steps.tag.outputs.tag }}
          VERSION=${VERSION#v}

          IFS='.' read MAJOR MINOR PATCH <<< "$VERSION"

          case "${{ inputs.bump-type }}" in
            major)
              MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0;;
            minor)
              MINOR=$((MINOR+1)); PATCH=0;;
            patch)
              PATCH=$((PATCH+1));;
          esac

          echo "new=$MAJOR.$MINOR.$PATCH" >> $GITHUB_OUTPUT

      - name: Maven version bump
        run: |
          mvn versions:set -DnewVersion=${{ steps.version.outputs.new }} -DgenerateBackupPoms=false

      - name: Commit bump
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add pom.xml
          git commit -m "Bump version to ${{ steps.version.outputs.new }} [skip ci]"
          git push

      - name: Tag release
        run: |
          git tag v${{ steps.version.outputs.new }} HEAD
          git push origin v${{ steps.version.outputs.new }}

      - name: Calculate next snapshot
        id: snapshot
        run: |
          VERSION=${{ steps.version.outputs.new }}
          IFS='.' read MAJOR MINOR PATCH <<< "$VERSION"
          PATCH=$((PATCH+1))
          echo "next=$MAJOR.$MINOR.$PATCH-SNAPSHOT" >> $GITHUB_OUTPUT

      - name: Set next snapshot version
        run: |
          mvn versions:set -DnewVersion=${{ steps.snapshot.outputs.next }} -DgenerateBackupPoms=false

      - name: Commit next snapshot
        run: |
          git add pom.xml
          git commit -m "Start next development iteration ${{ steps.snapshot.outputs.next }} [skip ci]"
          git push